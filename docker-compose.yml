# Optional: Local development only.
# You can connect directly to Supabase cloud instead.
# Use this for offline development or faster local queries.

services:
  redis:
    image: redis:7-alpine
    container_name: flowops-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
